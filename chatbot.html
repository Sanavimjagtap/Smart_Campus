<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Assistant</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
rel="stylesheet">

</head>

<body>
      {% include "components/sidebar.html" %}
<main class="main-content">
<header class="topbar">

    <div>

        <img src="{{ url_for('static', filename='images/logo_fc.jpg') }}"
             class="fc-logo">

        <span class="college-name">

            Fergusson College

        </span>

    </div>

</header>


<section class="ai-header fade">

    <h1>✨ Smart Campus AI</h1>

    <p>
        Your intelligent campus assistant.
        Ask anything about Fergusson College.
    </p>

</section>


<section class="suggestions fade">

<div class="suggestions">

    <button data-question="What are the library timings?">
        📚 Library
    </button>

    <button data-question="Show me the faculty list.">
        👨‍🏫 Faculty
    </button>

    <button data-question="Show today's notices.">
        📢 Notices
    </button>

    <button data-question="Tell me about laboratories.">
        🧪 Labs
    </button>

    <button data-question="Admission process">
        🎓 Admissions
    </button>

    <button data-question="Where is AC-1?">
        📍 Campus Map
    </button>

</div>
</section>


<section class="chat-box fade">

    <div class="messages" id="messages">

    <div class="bot-message">

        <strong>Campus AI</strong><br><br>

        Hello 👋

        <br><br>

        I'm your Smart Campus Assistant.

        <br>

        Ask me anything about Fergusson College.

    </div>

</div>


    <div class="chat-input">

<input
id="chatInput"
type="text"
placeholder="Ask anything about Fergusson College...">

<button id="sendBtn">

    ➜

</button>

    </div>

</section>

</main>
<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

</body>

</html>
